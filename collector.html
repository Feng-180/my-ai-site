        .card {

        @keyframes sp {

        .count-anim {

        @keyframes pop {
            0% {

        @media (max-width: 600px) {

        }
    </style>
</head>

<body>

    <script>
        // ===== 搜索关键词（精准白嫖渠道） =====
        const TASKS = [
            {
                cat: "w", label: "🛡️ 认证白嫖", kws: [
                    "ChatGPT Plus 大兵认证 免费 教程 军人认证 2026",
                    "GPT Plus 军人验证 免费订阅 方法 2026",
                    "Gemini Advanced 学生认证 免费 Google One AI",
                    "GitHub Copilot 学生认证 免费 教育优惠 2026",
                    "GitHub Education 学生包 申请 教程",
                    "JetBrains 学生认证 免费 IDE 教育",
                    "Azure 学生订阅 免费额度 AI 2026",
                    "AWS Educate 学生 免费云服务 AI",
                    "Google Cloud 学生 免费额度 2026",
                    "Notion AI 学生 教育优惠 免费",
                    "Cursor Pro 学生认证 免费 教育优惠",
                ]
            },
            {
                cat: "a", label: "🔑 API白嫖", kws: [
                    "OpenAI API 免费额度 白嫖 方法 2026",
                    "Claude API 免费 获取 额度 Anthropic 2026",
                    "Gemini API 免费 调用 Google AI Studio 2026",
                    "GPT-4 API 免费 替代 方案 第三方",
                    "AI API 免费 聚合 中转站 汇总 2026",
                    "Cloudflare Workers AI 免费 API 2026",
                    "Groq API 免费 高速推理 2026",
                    "Mistral AI API 免费 额度",
                    "DeepSeek API 免费 额度 白嫖 2026",
                    "通义千问 API 免费 额度 阿里 2026",
                    "免费 GPT API 合集 第三方接口 2026",
                    "Coze 扣子 免费 AI API 搭建",
                    "Grok API 免费 xAI 2026",
                ]
            },
            {
                cat: "e", label: "📧 学生邮箱", kws: [
                    "edu邮箱 免费 获取 方法 2026",
                    "edu教育邮箱 申请 白嫖 渠道 2026",
                    "ac.uk 学生邮箱 免费注册",
                    "edu邮箱 GitHub 学生包 申请",
                    "免费教育邮箱 AI工具 优惠 合集 2026",
                    "学生优惠 教育邮箱 AI 软件 合集",
                ]
            },
            {
                cat: "c", label: "💳 海外卡号", kws: [
                    "虚拟信用卡 订阅 ChatGPT 方法 推荐 2026",
                    "WildCard 虚拟卡 开通 AI 订阅 2026",
                    "Depay 虚拟卡 绑定 OpenAI 教程",
                    "海外银行卡 开通 AI服务 教程 2026",
                    "美国手机号 免费 获取 接码 AI注册",
                    "Google Voice 注册 AI 服务 教程",
                    "海外手机卡 esim 注册 AI 推荐 2026",
                    "接码平台 注册 ChatGPT Claude 推荐 2026",
                    "Wise 海外银行账户 AI 订阅 教程",
                    "OCBC 海外银行 开户 订阅 AI",
                ]
            },
            {
                cat: "t", label: "📚 白嫖教程", kws: [
                    "AI 白嫖 渠道 合集 汇总 2026",
                    "ChatGPT 免费用 白嫖 全攻略 2026",
                    "Claude Pro 白嫖 免费使用 方法 2026",
                    "Midjourney 免费 生成 白嫖 方法",
                    "AI 工具 免费 平替 合集 汇总 2026",
                    "Cursor Pro 免费 白嫖 方法 教程 2026",
                    "Copilot 免费 白嫖 方法 教程",
                    "Poe 免费 AI 白嫖 积分 方法",
                    "DeepSeek 免费 使用 方法 教程 2026",
                ]
            },
        ];

        // 多个 CORS 代理轮询使用，提高速度和可靠性
        const PROXIES = [
            u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
            u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
        ];
        let proxyIdx = 0;
        function getProxy(u) {
            const p = PROXIES[proxyIdx % PROXIES.length];
            proxyIdx++;
            return p(u);
        }

        const DDG = "https://html.duckduckgo.com/html/?q=";
        let all = [], curF = "all", kw = "";
        const seen = new Set();

        // ===== HTML 转义 =====
        function esc(s) {
            const d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        // ===== 安全打开链接 =====
        function safeOpen(url) {
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.click();
        }

        // ===== 解析 DuckDuckGo HTML =====
        function parse(html, cat, label) {
            const doc = new DOMParser().parseFromString(html, "text/html");
            const links = doc.querySelectorAll(".result__a");
            const snips = doc.querySelectorAll(".result__snippet");
            const out = [];
            links.forEach((a, i) => {
                let href = a.getAttribute("href") || "";
                if (href.includes("uddg=")) try { href = decodeURIComponent(href.split("uddg=")[1].split("&")[0]); } catch (e) { }
                const title = a.textContent.trim();
                const body = snips[i] ? snips[i].textContent.trim() : "";
                if (title && href.startsWith("http") && !seen.has(href)) {
                    seen.add(href);
                    out.push({ cat, label, title, body, url: href });
                }
            });
            return out;
        }

        // ===== 单个关键词搜索 =====
        async function fetchOne(keyword, cat, label) {
            const url = getProxy(DDG + encodeURIComponent(keyword));
            try {
                const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
                if (!r.ok) return [];
                return parse(await r.text(), cat, label);
            } catch (e) {
                // 用备用代理重试一次
                try {
                    const url2 = getProxy(DDG + encodeURIComponent(keyword));
                    const r2 = await fetch(url2, { signal: AbortSignal.timeout(12000) });
                    if (!r2.ok) return [];
                    return parse(await r2.text(), cat, label);
                } catch (e2) { return []; }
            }
        }

        // ===== 并发批量搜索（核心加速） =====
        async function go() {
            const btn = document.getElementById("goBtn");
            const prog = document.getElementById("prog");
            const pbar = document.getElementById("pbar");
            const ptxt = document.getElementById("ptxt");

            btn.disabled = true;
            btn.innerHTML = '<span class="spin"></span>搜寻中';
            prog.classList.add("show");
            all = []; seen.clear();

            // 汇总所有任务
            const jobs = [];
            for (const t of TASKS) for (const k of t.kws) jobs.push({ kw: k, cat: t.cat, label: t.label });
            const total = jobs.length;

            // 并发控制：同时发 6 个请求
            const BATCH = 6;
            for (let i = 0; i < total; i += BATCH) {
                const batch = jobs.slice(i, i + BATCH);
                ptxt.textContent = `⚡ 并发搜索中... (${Math.min(i + BATCH, total)}/${total})`;
                pbar.style.width = `${((i + BATCH) / total) * 100}%`;

                const results = await Promise.allSettled(
                    batch.map(j => fetchOne(j.kw, j.cat, j.label))
                );

                for (const r of results) {
                    if (r.status === "fulfilled" && r.value.length) {
                        all.push(...r.value);
                    }
                }
                render();
            }

            pbar.style.width = "100%";
            ptxt.textContent = `✅ 搜寻完毕！共 ${all.length} 条不重复结果`;

            const now = new Date().toLocaleString("zh-CN");
            const wc = all.filter(r => r.cat === 'w').length;
            const ac = all.filter(r => r.cat === 'a').length;
            const ec = all.filter(r => r.cat === 'e').length;
            const cc = all.filter(r => r.cat === 'c').length;
            const tc = all.filter(r => r.cat === 't').length;
            document.getElementById("stats").innerHTML = `
    <span class="badge glow count-anim">📊 共 ${all.length} 条</span>
    <span class="badge">🛡️ 认证 ${wc}</span>
    <span class="badge">🔑 API ${ac}</span>
    <span class="badge">📧 邮箱 ${ec}</span>
    <span class="badge">💳 海外卡 ${cc}</span>
    <span class="badge">📚 教程 ${tc}</span>
    <span class="badge">🕐 ${esc(now)}</span>
  `;

            btn.disabled = false;
            btn.innerHTML = "🔄 重新搜寻";
        }

        // ===== 渲染卡片 =====
        function render() {
            const box = document.getElementById("box");
            let list = all;
            if (curF !== "all") list = list.filter(r => r.cat === curF);
            if (kw) { const k = kw.toLowerCase(); list = list.filter(r => (r.title + r.body).toLowerCase().includes(k)); }

            if (!list.length) {
                box.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无匹配结果</p></div>';
                return;
            }

            const frag = document.createDocumentFragment();
            const gridDiv = document.createElement("div");
            gridDiv.className = "grid";

            list.forEach((it, idx) => {
                const tc = { w: "w", a: "a", e: "e", c: "c", t: "t" }[it.cat] || "w";
                let dm = "";
                try { dm = new URL(it.url).hostname; } catch (e) { }

                const card = document.createElement("div");
                card.className = "card";
                card.style.animationDelay = `${Math.min(idx * 0.03, 0.6)}s`;
                card.setAttribute("role", "link");
                card.setAttribute("tabindex", "0");

                const url = it.url;
                card.addEventListener("click", () => safeOpen(url));
                card.addEventListener("keydown", (e) => { if (e.key === "Enter") safeOpen(url); });

                card.innerHTML = `
                    <span class="tag ${esc(tc)}">${esc(it.label)}</span>
                    <div class="ctitle">${esc(it.title)}</div>
                    <div class="cbody">${esc(it.body)}</div>
                    <div class="csrc">🔗 ${esc(dm)}</div>
                `;
                gridDiv.appendChild(card);
            });

            frag.appendChild(gridDiv);
            box.innerHTML = "";
            box.appendChild(frag);
        }

        function fil(f, el) {
            curF = f;
            document.querySelectorAll('[data-f]').forEach(b => b.classList.remove('on'));
            el.classList.add('on');
            render();
        }
    </script>
</body>

</html>
