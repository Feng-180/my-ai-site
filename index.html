<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零撸情报局 | 绝密资源库</title>
    <meta name="description" content="零撸情报局 - 自动化白嫖资源系统，AES-256 高强度加密，Cyberpunk 极客风界面。">
    <meta property="og:title" content="零撸情报局 | 绝密资源库">
    <meta property="og:description" content="自动化白嫖资源系统，AES-256 加密私密数据库。">
    <meta property="og:type" content="website">
    <!-- 引入 CryptoJS 用于本地解密 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0e15;
            --text: #e2e8f0;
            --primary: #00ffcc;
            --secondary: #ff007f;
            --card-bg: rgba(20, 25, 40, 0.8);
            --border: rgba(0, 255, 204, 0.3);
            --font: "Noto Sans SC", sans-serif;
            --font-mono: "Consolas", "Courier New", monospace;
        }

        /* Loading State */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 204, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            font-family: var(--font-mono);
            color: var(--primary);
            font-size: 12px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 204, 0.1), transparent 50%);
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* 锁屏界面 */
        #lock-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(10, 12, 20, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .glitch-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 0 var(--secondary), -2px 0 blue;
            margin-bottom: 10px;
            animation: glitchFlicker 3s ease-in-out infinite;
        }

        @keyframes glitchFlicker {

            0%,
            100% {
                text-shadow: 2px 0 var(--secondary), -2px 0 blue;
            }

            25% {
                text-shadow: -2px 0 var(--secondary), 2px 0 blue;
            }

            50% {
                text-shadow: 2px 1px var(--secondary), -1px -2px blue;
            }

            75% {
                text-shadow: -1px 2px var(--secondary), 1px -1px blue;
            }
        }

        .lock-subtitle {
            color: #888;
            margin-bottom: 30px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .pwd-input {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 1.2rem;
            padding: 15px 20px;
            width: 300px;
            text-align: center;
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
            -webkit-text-security: disc;
        }

        .pwd-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .btn-unlock {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 40px;
            font-family: var(--font-mono);
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-unlock:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 20px var(--secondary);
        }

        .error-msg {
            color: var(--secondary);
            margin-top: 15px;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            min-height: 20px;
        }

        /* Link to collector */
        .lock-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .lock-links a {
            color: #555;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            transition: 0.3s;
        }

        .lock-links a:hover {
            color: var(--primary);
            border-color: var(--border);
        }

        /* 主界面 */
        #main-content {
            display: none;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .sys-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            margin: 0;
        }

        .sys-stats {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: #888;
            text-align: right;
        }

        .sys-stats span {
            color: var(--secondary);
        }

        /* Navigation bar */
        .main-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            transition: 0.3s;
        }

        .main-nav a:hover {
            color: var(--primary);
            border-color: var(--border);
            background: rgba(0, 255, 204, 0.05);
        }

        /* Search / Filter bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 18px;
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid var(--border);
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
        }

        .filter-bar .search-input::placeholder {
            color: #444;
        }

        .filter-bar .search-input:focus {
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .filter-bar select {
            padding: 10px 14px;
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid var(--border);
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .filter-bar select option {
            background: #1a1a2e;
            color: #ccc;
        }

        /* 资源网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--primary);
            padding: 25px;
            border-radius: 4px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(5px);
            opacity: 0;
            animation: cardFadeIn 0.5s ease forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            border-left-color: var(--secondary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 0, 127, 0.2);
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .c-type {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            padding: 3px 8px;
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
            border-radius: 2px;
        }

        .c-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-right: 60px;
            line-height: 1.4;
            color: #fff;
        }

        .c-desc {
            font-size: 0.85rem;
            color: #aaa;
            flex-grow: 1;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .c-tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--secondary);
            margin-bottom: 15px;
        }

        .btn-link {
            align-self: flex-start;
            padding: 8px 20px;
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .card:hover .btn-link {
            background: var(--primary);
            color: #000;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-family: var(--font-mono);
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .sys-stats {
                text-align: left;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .glitch-title {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .pwd-input {
                width: 260px;
            }

            .lock-links {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loader"></div>
        <div class="loader-text">正在初始化解密系统...</div>
    </div>

    <!-- 锁屏验证 -->
    <div id="lock-screen">
        <div class="glitch-title">零撸情报局</div>
        <div class="lock-subtitle">加密数据库 // 限制访问 // AES-256-CBC</div>
        <input type="text" class="pwd-input" id="pwd" placeholder="输入解密密钥"
            onkeydown="if(event.key==='Enter') decryptData()">
        <button class="btn-unlock" onclick="decryptData()">▶ 解密数据</button>
        <div class="error-msg" id="error"></div>
        <div class="lock-links">
            <a href="collector.html">⚡ AI 羊毛搜集器</a>
        </div>
    </div>

    <!-- 数据展示页 -->
    <div id="main-content">
        <header>
            <div>
                <h1 class="sys-title">白嫖资源库</h1>
                <div style="font-family:var(--font-mono); font-size:0.8rem; color:#666; margin-top:5px;">全自动抓取系统 v3.0
                </div>
            </div>
            <div class="sys-stats">
                <div>最后更新: <span id="sync-time">--</span></div>
                <div>情报总数: <span id="total-count">0</span></div>
            </div>
        </header>

        <nav class="main-nav">
            <a href="collector.html">⚡ AI 羊毛搜集器（实时搜索）</a>
        </nav>

        <!-- Search / Filter -->
        <div class="filter-bar">
            <input type="text" class="search-input" id="searchField" placeholder="搜索资源标题或描述..." oninput="filterCards()">
            <select id="typeFilter" onchange="filterCards()">
                <option value="all">全部类型</option>
            </select>
        </div>

        <div class="grid" id="data-grid">
            <!-- 卡片由 JS 渲染 -->
        </div>

        <div class="no-results" id="noResults" style="display:none;">
            没有找到匹配的资源
        </div>
    </div>

    <script>
        // HTML 转义函数，防止 XSS
        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // AES 解密核心逻辑 (对应 Python 的 AES-CBC-256)
        function decryptAES(encryptedBase64, password) {
            try {
                const dataStr = atob(encryptedBase64);
                const ivStr = dataStr.substring(0, 16);
                const cipherStr = dataStr.substring(16);

                let keyStr = password;
                while (keyStr.length < 32) keyStr += '\0';
                keyStr = keyStr.substring(0, 32);

                const key = CryptoJS.enc.Utf8.parse(keyStr);
                const iv = CryptoJS.enc.Latin1.parse(ivStr);

                let cipherHex = "";
                for (let i = 0; i < cipherStr.length; i++) {
                    const hex = cipherStr.charCodeAt(i).toString(16);
                    cipherHex += (hex.length === 1 ? "0" + hex : hex);
                }
                const cipherParams = CryptoJS.lib.CipherParams.create({
                    ciphertext: CryptoJS.enc.Hex.parse(cipherHex)
                });

                const decrypted = CryptoJS.AES.decrypt(cipherParams, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return null;
            }
        }

        let allItems = [];

        async function decryptData() {
            const pwd = document.getElementById('pwd').value;
            const errEl = document.getElementById('error');

            if (!pwd) { errEl.innerText = "请输入密钥"; return; }
            errEl.innerText = "正在获取加密数据包...";

            try {
                const res = await fetch('data.enc?t=' + new Date().getTime());
                if (!res.ok) throw new Error("数据文件不存在或网络错误");
                const encryptedBase64 = await res.text();

                errEl.innerText = "尝试解密...";

                const decryptedStr = decryptAES(encryptedBase64.trim(), pwd);

                if (!decryptedStr) {
                    errEl.innerText = "密钥错误，解密失败！";
                    document.getElementById('pwd').value = '';
                    return;
                }

                const data = JSON.parse(decryptedStr);
                allItems = data.items || [];
                renderData(data);

                document.getElementById('loading').classList.add('hidden');

                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.visibility = 'hidden';
                    document.getElementById('main-content').style.display = 'block';
                }, 500);

            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                errEl.innerText = "系统错误: " + err.message;
            }
        }

        function renderData(data) {
            document.getElementById('sync-time').innerText = data.update_time || '--';
            document.getElementById('total-count').innerText = data.total || 0;

            // Populate type filter
            const types = [...new Set(allItems.map(i => i.type))];
            const sel = document.getElementById('typeFilter');
            sel.innerHTML = '<option value="all">全部类型</option>';
            types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                sel.appendChild(opt);
            });

            renderCards(allItems);
        }

        function renderCards(items) {
            const grid = document.getElementById('data-grid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            if (!items.length) {
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            items.forEach((item, index) => {
                const delay = Math.min(index * 0.04, 1);
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = delay + 's';
                card.innerHTML = `
                    <div class="c-type">${escHtml(item.type || '')}</div>
                    <div class="c-title">${escHtml(item.title || '')}</div>
                    <div class="c-tag"># ${escHtml(item.tag || '')}</div>
                    <div class="c-desc">${escHtml(item.desc || '')}</div>
                    <a href="${escHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer" class="btn-link">传送门 »</a>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const query = document.getElementById('searchField').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;

            let filtered = allItems;
            if (type !== 'all') {
                filtered = filtered.filter(i => i.type === type);
            }
            if (query) {
                filtered = filtered.filter(i =>
                    (i.title || '').toLowerCase().includes(query) ||
                    (i.desc || '').toLowerCase().includes(query) ||
                    (i.tag || '').toLowerCase().includes(query)
                );
            }
            renderCards(filtered);
        }
    </script>
</body>

</html>
