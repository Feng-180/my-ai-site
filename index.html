            pointer-events: none;
            z-index: 0;

        .bg-effects::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            top: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08), transparent 70%);
            animation: floatGlow 20s ease-in-out infinite;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.06), transparent 70%);

        }

        @keyframes floatGlow {

            }

            66% {

        .card {
            background: var(--bg-card);

        .card-desc {

        .card-bottom {

        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {

            }

            }

            }

            .cat-tabs {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
            }
        }
    </style>
</head>

        const CURATED_API = [
            { title: 'Google AI Studio', url: 'https://aistudio.google.com', desc: 'Gemini API 免费调用平台，每分钟 15 次请求，每日免费额度极大方。', cat: 'api', tag: '免费 API', source: '精选' },
            { title: 'DeepSeek API', url: 'https://platform.deepseek.com', desc: 'DeepSeek 开放平台，注册即送免费 API 额度，性价比极高。', cat: 'api', tag: '免费额度', source: '精选' },
            { title: 'Groq API', url: 'https://console.groq.com', desc: 'Groq 超高速推理平台，Llama/Mixtral 模型免费调用，推理速度极快。', cat: 'api', tag: '免费 API', source: '精选' },
            { title: 'Cloudflare Workers AI', url: 'https://developers.cloudflare.com/workers-ai/', desc: 'Cloudflare AI 推理服务，每日 1 万次免费推理请求，部署简单。', cat: 'api', tag: '免费 API', source: '精选' },
            { title: 'Mistral AI API', url: 'https://console.mistral.ai', desc: 'Mistral 开放平台，注册即获免费 API 额度，支持多种开源模型。', cat: 'api', tag: '免费额度', source: '精选' },
            { title: 'Hugging Face', url: 'https://huggingface.co', desc: 'AI 模型库和推理 API，大量免费模型可直接调用，社区活跃。', cat: 'api', tag: '开源', source: '精选' },
            { title: '通义千问 API', url: 'https://dashscope.aliyun.com', desc: '阿里灵积平台，注册即送百万 Token 免费额度，Qwen 系列模型全线可用。', cat: 'api', tag: '免费额度', source: '精选' },
            { title: 'Coze (扣子)', url: 'https://www.coze.com', desc: '字节跳动 AI 开发平台，可免费搭建 AI Bot 并调用多种大模型。', cat: 'api', tag: '免费', source: '精选' },
        ];

        const CURATED_EDU = [
            { title: 'ChatGPT Plus 大兵认证', url: 'https://chat.openai.com', desc: '通过美国军人身份验证可免费获得 ChatGPT Plus 订阅，需要美国手机号配合验证。', cat: 'edu', tag: '认证白嫖', source: '精选' },
            { title: 'Gemini Advanced 学生认证', url: 'https://one.google.com', desc: 'Google One AI Premium 学生版免费，含 Gemini Advanced 和 2TB 存储。', cat: 'edu', tag: '学生优惠', source: '精选' },
            { title: 'GitHub Education 学生包', url: 'https://education.github.com/pack', desc: '含 GitHub Copilot 免费、Azure 云额度、JetBrains 全家桶等数十项开发者福利。', cat: 'edu', tag: '学生优惠', source: '精选' },
            { title: 'JetBrains 学生认证', url: 'https://www.jetbrains.com/community/education/', desc: 'IntelliJ IDEA / PyCharm / WebStorm 等全部 IDE 免费使用，需教育邮箱。', cat: 'edu', tag: '学生优惠', source: '精选' },
            { title: 'Azure 学生订阅', url: 'https://azure.microsoft.com/free/students/', desc: '无需信用卡，注册即得 $100 AI 额度和免费云服务，含 OpenAI 服务访问。', cat: 'edu', tag: '学生优惠', source: '精选' },
            { title: 'Cursor Pro 学生认证', url: 'https://cursor.com', desc: 'AI 编程编辑器，学生版免费使用 Pro 功能，提高编程效率。', cat: 'edu', tag: '学生优惠', source: '精选' },
            { title: 'Notion 教育版', url: 'https://www.notion.so/product/notion-for-education', desc: 'Notion Plus 教育版免费，含 Notion AI，使用教育邮箱即可申请。', cat: 'edu', tag: '学生优惠', source: '精选' },
        ];

        // ==================== 实时数据源 ====================

        /** 从 GitHub API 获取 AI 相关高星项目 */
        async function fetchGitHubTrending() {
            try {
                const resp = await fetch('https://api.github.com/search/repositories?q=topic:ai+topic:llm+stars:>500&sort=updated&order=desc&per_page=20', {
                    signal: AbortSignal.timeout(10000)
                });
                if (!resp.ok) return [];
                const data = await resp.json();
                return (data.items || []).map(repo => ({
                    title: repo.full_name,
                    url: repo.html_url,
                    desc: repo.description || '暂无描述',
                    cat: 'dev',
                    tag: `⭐ ${(repo.stargazers_count / 1000).toFixed(1)}k`,
                    source: '实时 · GitHub',
                }));
            } catch (e) { return []; }
        }

        /** 从 GitHub API 获取 free-for-dev 部分内容 */
        async function fetchFreeForDev() {
            try {
                const resp = await fetch('https://raw.githubusercontent.com/ripienaar/free-for-dev/master/README.md', {
                    signal: AbortSignal.timeout(10000)
                });
                if (!resp.ok) return [];
                const text = await resp.text();
                const pattern = /^\* \[(.+?)\]\((.+?)\)(.*)$/gm;
                const items = [];
                let m;
                while ((m = pattern.exec(text)) !== null && items.length < 25) {
                    const [, name, url, rawDesc] = m;
                    const desc = (rawDesc || '').replace(/^[\s\-—]+/, '').trim() || '提供免费计划的开发者服务';
                    // 只保留 AI / Cloud / API 相关
                    const kws = ['ai', 'ml', 'api', 'cloud', 'deploy', 'database', 'hosting', 'serverless', 'monitor'];
                    if (kws.some(k => (name + desc).toLowerCase().includes(k))) {
                        items.push({ title: name, url, desc: desc.slice(0, 180), cat: 'dev', tag: '免费套餐', source: '实时 · Free-for-Dev' });
                    }
                }
                return items;
            } catch (e) { return []; }
        }

        /** 从 Hacker News API 获取 AI 相关热门 */
        async function fetchHackerNews() {
            try {
                const resp = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json', {
                    signal: AbortSignal.timeout(8000)
                });
                if (!resp.ok) return [];
                const ids = (await resp.json()).slice(0, 40);

                const aiKws = ['ai', 'gpt', 'llm', 'openai', 'claude', 'gemini', 'deepseek', 'model',
                    'transformer', 'copilot', 'neural', 'machine learning', 'anthropic', 'chatbot', 'agent'];

                const stories = await Promise.allSettled(
                    ids.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`, {
                        signal: AbortSignal.timeout(5000)
                    }).then(r => r.json()))
                );

                const items = [];
                for (const r of stories) {
                    if (r.status !== 'fulfilled' || !r.value) continue;
                    const s = r.value;
                    const title = s.title || '';
                    if (aiKws.some(k => title.toLowerCase().includes(k))) {
                        items.push({
                            title: title,
                            url: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
                            desc: `Hacker News 热度: ${s.score || 0} 分 · ${s.descendants || 0} 条评论`,
                            cat: 'news',
                            tag: '热门',
                            source: '实时 · Hacker News',
                        });
                    }
                    if (items.length >= 15) break;
                }
                return items;
            } catch (e) { return []; }
        }

        /** 加载缓存数据（GitHub Actions 生成的 data.json） */
        async function fetchCachedData() {
            try {
                const resp = await fetch('data.json?t=' + Date.now(), { signal: AbortSignal.timeout(5000) });
                if (!resp.ok) return [];
                const data = await resp.json();
                return (data.items || []).map(it => ({
                    ...it,
                    source: it.source || '缓存 · 自动抓取',
                }));
            } catch (e) { return []; }
        }

        // ==================== 渲染 ====================

        function renderCards(items) {
            const content = document.getElementById('content');
            if (!items.length) {
                content.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>没有找到匹配的资源</p></div>';
                return;
            }
            const grid = document.createElement('div');
            grid.className = 'grid';
            items.forEach((it, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${Math.min(i * 0.04, 0.8)}s`;
                card.addEventListener('click', () => safeOpen(it.url));
                card.setAttribute('tabindex', '0');
                card.addEventListener('keydown', e => { if (e.key === 'Enter') safeOpen(it.url); });

                const isLive = (it.source || '').includes('实时');
                let dm = '';
                try { dm = new URL(it.url).hostname; } catch (e) { }

                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-cat ${esc(it.cat)}">${esc(CAT_LABELS[it.cat] || it.cat)}</span>
                        <span class="card-source${isLive ? ' live' : ''}">${isLive ? '🟢 ' : ''}${esc(it.source || '')}</span>
                    </div>
                    <div class="card-title">${esc(it.title)}</div>
                    <div class="card-desc">${esc(it.desc)}</div>
                    <div class="card-bottom">
                        <span class="card-tag">${esc(it.tag || '')}</span>
                        <span class="card-link">🔗 ${esc(dm)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
            content.innerHTML = '';
            content.appendChild(grid);
        }

        function doFilter() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems;
            if (currentCat !== 'all') filtered = filtered.filter(it => it.cat === currentCat);
            if (q) filtered = filtered.filter(it =>
                (it.title || '').toLowerCase().includes(q) ||
                (it.desc || '').toLowerCase().includes(q) ||
                (it.tag || '').toLowerCase().includes(q)
            );
            renderCards(filtered);
        }

        function switchCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            doFilter();
        }

        function updateStats() {
            const counts = {};
            for (const it of allItems) counts[it.cat] = (counts[it.cat] || 0) + 1;
            const liveCount = allItems.filter(it => (it.source || '').includes('实时')).length;
            const row = document.getElementById('statsRow');
            row.innerHTML = `
                <span class="stat-badge"><span class="num">${allItems.length}</span> 条资源</span>
                <span class="stat-badge live">实时数据 ${liveCount} 条</span>
                <span class="stat-badge">🤖 AI ${counts.ai || 0}</span>
                <span class="stat-badge">🔑 API ${counts.api || 0}</span>
                <span class="stat-badge">🎓 认证 ${counts.edu || 0}</span>
                <span class="stat-badge">💻 开发 ${counts.dev || 0}</span>
                <span class="stat-badge">📰 资讯 ${counts.news || 0}</span>
                <span class="stat-badge">🕐 ${new Date().toLocaleString('zh-CN')}</span>
            `;
        }

        // ==================== 主入口 ====================
        async function init() {
            // 1. 先加载精选资源（瞬间显示）
            allItems = dedup([...CURATED_AI_TOOLS, ...CURATED_API, ...CURATED_EDU]);
            renderCards(allItems);
            updateStats();

            // 2. 并发获取实时数据
            const [gh, ffd, hn, cached] = await Promise.allSettled([
                fetchGitHubTrending(),
                fetchFreeForDev(),
                fetchHackerNews(),
                fetchCachedData(),
            ]);

            const liveData = [];
            if (gh.status === 'fulfilled') liveData.push(...gh.value);
            if (ffd.status === 'fulfilled') liveData.push(...ffd.value);
            if (hn.status === 'fulfilled') liveData.push(...hn.value);
            if (cached.status === 'fulfilled') liveData.push(...cached.value);

            // 3. 合并去重并刷新
            allItems = dedup([...allItems, ...liveData]);
            doFilter();
            updateStats();
        }

        // 启动
        init();
    </script>
</body>
